services:
  video_in:
    image: containers.openfilter.io/plainsightai/openfilter-video-inopenfilter-faceblur:1.1.6
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-faceblur:1.1.6}
      FILTER_ID: VideoIn
      FILTER_SOURCES: file:///video.mp4!sync!loop
      FILTER_OUTPUTS: tcp://*
    volumes:
      - ./data/video-01.mp4:/video.mp4openfilter-faceblur:1.1.6

  faceblur_filter:
    image: containers.openfilter.io/plainsightai/openfilter-faceblur:1.1.6
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-faceblur:1.1.6}
      FILTER_ID: FaceblurFilter
      FILTER_SOURCES: tcp://video_in
      FILTER_OUTPUTS: tcp://*

  webvis:
    image: containers.openfilter.io/plainsightai/openfilter-webvisopenfilter-faceblur:1.1.6
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-faceblur:1.1.6}
      FILTER_ID: Webvis
      FILTER_SOURCES: tcp://faceblur_filter
    ports:
      - 8001openfilter-faceblur:1.1.6